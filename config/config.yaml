targets_file: "targets/targets.txt"
db_path: "scans.db"

scan:
  masscan_rate: 3000
  nmap_threads: 10
  default_ports: "1-65535"
  masscan_binary: "masscan" # или полный путь в Windows

telegram:
  enabled: false # включите при наличии токена
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"

webhook:
  enabled: false
  url: "https://your-webhook-url.com/alert"

email:
  enabled: false
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  username: "your_email@gmail.com"
  password: "your_app_password"
  from_addr: "your_email@gmail.com"
  to_addrs: ["admin@example.com"]

high_risk_ports:
  - 22
  - 23
  - 3306
  - 5432
  - 6379
  - 27017
  - 9200
  - 9000
  - 8080
  - 8443
